<div class="tubelight-navbar" [class.hidden-nav]="isHidden">
  <div class="navbar-inner">
    <div class="logo-wrap">
      <a href="/">
        <img class="lion-logo" src="assets/images/logoblanco.png" alt="Logo">
      </a>
    </div>

    <div class="navbar-container">
      <a *ngFor="let item of navItems" [href]="item.url" (click)="setActiveTab(item.name, $event)" class="nav-item"
        [class.active]="activeTab === item.name">

        <span class="nav-text">{{ item.name }}</span>
        <span class="nav-icon d-md-none">
          <i [class]="item.icon"></i>
        </span>

        <div *ngIf="activeTab === item.name" class="lamp-effect" aria-hidden="true">
          <div class="lamp-base">
            <div class="lamp-light"></div>
            <div class="lamp-glow-top"></div>
            <div class="lamp-glow-bottom"></div>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
