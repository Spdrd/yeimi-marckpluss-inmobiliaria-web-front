<!-- === FONDO DE LA SECCIÓN === -->
<div class="grid-wrapper" id="filtrar-propiedades">
  <div class="grid-background"></div>

  <!-- === CONTENIDO: FILTROS Y LISTADO DE PROPIEDADES === -->
  <div class="skills-content">
    <h2 class="section-title2">Un inmueble a tu medida</h2>

    <!-- FILTROS DE PROPIEDADES -->
    <section class="filters-box">
      <div class="filters-header">
        <div class="tabs">
          <button type="button" class="tab" [class.active]="filters.biz === 'VENTA'" (click)="setBiz('VENTA')">Venta</button>
          <button type="button" class="tab" [class.active]="filters.biz === 'ALQUILER'" (click)="setBiz('ALQUILER')">Alquiler</button>
        </div>
      </div>

      <form class="filters-form" (ngSubmit)="0">
        <input type="text" placeholder="Ciudad" [(ngModel)]="filters.city" name="city">
        <select [(ngModel)]="filters.type" name="type">
          <option value="">Tipo (cualquiera)</option>
          <option value="APARTAMENTO">APARTAMENTO</option>
          <option value="CASA">CASA</option>
        </select>
        <input type="number" placeholder="Habitaciones" [(ngModel)]="filters.bedrooms" name="bedrooms">
        <input type="number" placeholder="Baños" [(ngModel)]="filters.bathrooms" name="bathrooms">
        <input type="number" placeholder="Precio min" [(ngModel)]="filters.minPrice" name="minPrice">
        <input type="number" placeholder="Precio max" [(ngModel)]="filters.maxPrice" name="maxPrice">
        <div class="actions">
          <button class="btn btn-search" type="button" (click)="0">Buscar</button>
          <button class="btn" type="button" (click)="resetFilters()">Limpiar</button>
        </div>
      </form>
    </section>

    <!-- RESULTADOS: TARJETAS DE PROPIEDADES -->
    <section class="skills-section">
      <div class="skills-grid">

        <div class="card property-card" *ngFor="let p of filteredProperties">
          <div class="property-image" [style.backgroundImage]="'url(' + p.image1 + ')'">
            <div class="ribbon">{{ p.type }}</div>
            <div class="price-badge">{{ p.price_format }}</div>
          </div>
          <div class="property-body">
            <h3 class="heading">{{ p.address }}</h3>
            <p class="subinfo">{{ p.city }} — {{ p.neighborhood }}</p>
            <p class="description">{{ p.description }}</p>
            <div class="stats-row">
              <span class="stat">🏠 {{ p.area_cons }} m²</span>
              <span class="stat">🛏 {{ p.bedrooms }}</span>
              <span class="stat">🛁 {{ p.bathrooms }}</span>
            </div>
            <div class="card-actions">
              <a class="btn btn-buy" href="#">Ver detalle</a>
            </div>
          </div>
        </div>

      </div>
    </section>
  </div>
</div>
