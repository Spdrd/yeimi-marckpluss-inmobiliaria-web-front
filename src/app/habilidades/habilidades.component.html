<!-- === FONDO DE LA SECCIÓN === -->
<div class="grid-wrapper" id="filtrar-propiedades">
  <div class="grid-background"></div>

  <!-- === CONTENIDO: FILTROS Y LISTADO DE PROPIEDADES === -->
  <div class="skills-content">

    <!-- FILTROS DE PROPIEDADES -->
    <section class="filters-wrapper">
      <!-- Tabs externos elegantes -->
      <div class="external-tabs">
        <button type="button" class="external-tab" [class.active]="filters.biz === 'VENTA'" (click)="setBiz('VENTA')">
          <i class="fas fa-tag"></i>
          <span>Venta</span>
        </button>
        <button type="button" class="external-tab" [class.active]="filters.biz === 'ALQUILER'"
          (click)="setBiz('ALQUILER')">
          <i class="fas fa-handshake"></i>
          <span>Alquiler</span>
        </button>

        <!-- Etiqueta de título decorativa -->
        <div class="filter-title-badge">
          <i class="fas fa-home"></i>
          <span>Selecciona a tu medida</span>
        </div>
      </div>

      <!-- Caja de filtros con efecto destello -->
      <div class="filters-box" [attr.data-active-tab]="filters.biz">
        <form class="filters-form" (ngSubmit)="$event.preventDefault()">
          <div class="filter-group">
            <label><i class="fas fa-map-marker-alt"></i> Ciudad</label>
            <input type="text" placeholder="Ej: Bogotá" [(ngModel)]="filters.city" name="city">
          </div>

          <div class="filter-group">
            <label><i class="fas fa-building"></i> Tipo</label>
            <div class="custom-select">
              <button class="select-trigger" type="button" (click)="toggleTypeDropdown()">
                <span>{{ getTypeLabel() }}</span>
                <i class="fas fa-chevron-down"></i>
              </button>
              <div class="select-dropdown" *ngIf="isTypeDropdownOpen">
                <button type="button" class="select-option" *ngFor="let option of typeOptions"
                  [class.active]="filters.type === option.value" (click)="selectType(option.value)">
                  {{ option.label }}
                </button>
              </div>
            </div>
          </div>

          <div class="filter-group">
            <label><i class="fas fa-bed"></i> Habitaciones</label>
            <input type="number" placeholder="Nº" [(ngModel)]="filters.bedrooms" name="bedrooms" min="0">
          </div>

          <div class="filter-group">
            <label><i class="fas fa-bath"></i> Baños</label>
            <input type="number" placeholder="Nº" [(ngModel)]="filters.bathrooms" name="bathrooms" min="0">
          </div>

          <div class="filter-group">
            <label><i class="fas fa-dollar-sign"></i> Precio mínimo</label>
            <input type="number" placeholder="Min" [(ngModel)]="filters.minPrice" name="minPrice" min="0">
          </div>

          <div class="filter-group">
            <label><i class="fas fa-dollar-sign"></i> Precio máximo</label>
            <input type="number" placeholder="Max" [(ngModel)]="filters.maxPrice" name="maxPrice" min="0">
          </div>

          <div class="filter-actions">
            <button class="btn-primary" type="button">
              <i class="fas fa-search"></i>
              Buscar
            </button>
            <button class="btn-secondary" type="button" (click)="resetFilters()">
              <i class="fas fa-redo"></i>
              Limpiar
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- RESULTADOS: TARJETAS DE PROPIEDADES -->
    <section class="skills-section">
      <div class="skills-grid">

        <div class="card property-card" *ngFor="let p of filteredProperties">
          <div class="property-image" [style.backgroundImage]="'url(' + getCurrentImage(p) + ')'">
            <div class="ribbon">{{ p.type }}</div>
            <div class="price-badge">${{ p.price_format }}</div>

            <!-- Controles de navegación de imágenes -->
            <div class="image-controls" *ngIf="p.images && p.images.length > 1">
              <button class="nav-arrow nav-prev" (click)="prevImage(p, $event)" type="button"
                aria-label="Imagen anterior">
                <i class="fas fa-chevron-left"></i>
              </button>
              <button class="nav-arrow nav-next" (click)="nextImage(p, $event)" type="button"
                aria-label="Siguiente imagen">
                <i class="fas fa-chevron-right"></i>
              </button>

              <!-- Indicador de fotos -->
              <div class="image-indicator">
                <span class="current-image">{{ p.currentImageIndex + 1 }}</span>
                <span class="separator">/</span>
                <span class="total-images">{{ p.images.length }}</span>
              </div>
            </div>
          </div>
          <div class="property-body">
            <h3 class="heading">{{ p.address }}</h3>
            <p class="subinfo">
              <span class="location-icon">
                <span class="loader-shape-3"></span>
              </span>
              {{ p.city }} — {{ p.neighborhood }}
            </p>
            <p class="description">{{ p.description }}</p>
            <div class="stats-row">
              <span class="stat"><span class="stat-icon"><i class="fas fa-ruler-combined"
                    aria-hidden="true"></i></span><span class="stat-value">{{ p.area_cons }}</span><span
                  class="metrica"> m²</span></span>
              <span class="stat"><span class="stat-icon"><i class="fas fa-bed" aria-hidden="true"></i></span><span
                  class="stat-value">{{ p.bedrooms }}</span></span>
              <span class="stat"><span class="stat-icon"><i class="fas fa-bath" aria-hidden="true"></i></span><span
                  class="stat-value">{{ p.bathrooms }}</span></span>
            </div>
            <div class="card-actions">
              <div class="card-actions">
              <a class="btn-buy" href="#" (click)="viewPropertyDetail(p, $event)">
                Ver detalle
              </a>
              <button (click)="enviarWhatsApp(p)" class="btn-secondary" type="button">
                <i class="fab fa-whatsapp"></i> 
                Consultar esta propiedad
              </button>
            </div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </div>
</div>
