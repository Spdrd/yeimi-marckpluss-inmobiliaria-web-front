<section class="tech-section" id="tecnologias" #statsSection>
  <h2 class="section-title2">Te brindamos experiencia y garantia</h2>

  <div class="stats-grid" role="list" aria-label="Estadisticas de la inmobiliaria">
    <article class="stat-item" *ngFor="let stat of stats" role="listitem">
      <div class="circle-shell" [class.is-loading]="stat.isAnimating">
        <svg class="circle-progress" viewBox="0 0 220 220" aria-hidden="true" focusable="false">
          <circle class="circle-track" cx="110" cy="110" [attr.r]="radius"></circle>
          <circle
            class="circle-meter"
            cx="110"
            cy="110"
            [attr.r]="radius"
            [attr.stroke-dasharray]="circumference"
            [style.stroke-dashoffset.px]="getStrokeOffset(stat.progress)"
          ></circle>
        </svg>

        <div class="circle-center">
          <div class="stat-number">{{ formatValue(stat.displayValue) }}</div>
          <div class="stat-unit">{{ stat.unit }}</div>
        </div>
      </div>
      <p class="value-text">{{ stat.subtitle }}</p>
    </article>
  </div>
</section>
