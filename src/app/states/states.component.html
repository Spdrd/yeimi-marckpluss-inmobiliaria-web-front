<section class="tech-section" id="tecnologias" #statsSection>
  <h2 class="section-title2">Te brindamos experiencia y garantía</h2>

  <div class="stats-grid" role="list" aria-label="Valores de la inmobiliaria">
    <article class="stat-item" *ngFor="let stat of stats" role="listitem">
      <div class="circle-shell" [class.is-loading]="stat.isAnimating">
        <svg class="circle-progress" viewBox="0 0 220 220" aria-hidden="true">
          <circle class="circle-track" cx="110" cy="110" [attr.r]="radius"></circle>
          <circle
            class="circle-meter"
            cx="110"
            cy="110"
            [attr.r]="radius"
            [attr.stroke-dasharray]="circumference"
            [style.stroke-dashoffset.px]="getStrokeOffset(stat.progress)"
            [style.stroke]="stat.color"
          ></circle>
        </svg>

        <div class="circle-center">
          <i [class]="stat.icon" class="stat-icon"></i>
          <h3 class="stat-title-inner">{{ stat.title }}</h3>
        </div>
      </div>
      <p class="value-text">{{ stat.text }}</p>
    </article>
  </div>
</section>
