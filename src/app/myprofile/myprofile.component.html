<div class="myprofile">
  <img src="assets/images/casitas.jpg" alt="Portada" class="background-image" />
  <!-- Texto y overlay encima -->
  <div class="overlay">
    <h1 class="intro-text">
      Inmobiliaria MarckPlus <br>
      <p class="texto-portada">El lugar de tus sueños, te lo tenemos aquí</p>
      
    </h1>
    <!-- Botones Comprar / Alquilar -->
    <div class="cta-area" [class.hidden]="!showButtonsVisible">
      <div class="cta-buttons">
        <button class="btn btn-buy" (click)="toggleFilter('buy')">Comprar</button>
        <button class="btn btn-rent" (click)="toggleFilter('rent')">Alquilar</button>
      </div>

      <!-- Filtros para Comprar -->
      <div class="filters" *ngIf="selectedFilter === 'buy'">
        <form class="filters-form" (submit)="$event.preventDefault()">
          <input type="text" placeholder="Ubicación" name="location" />
          <select name="propertyType">
            <option value="">Tipo de propiedad</option>
            <option>Casa</option>
            <option>Apartamento</option>
            <option>Terreno</option>
          </select>
          <input type="number" placeholder="Tamaño (m²)" name="size" />
          <div class="price-range">
            <input type="number" placeholder="Precio mínimo" name="priceMin" />
            <input type="number" placeholder="Precio máximo" name="priceMax" />
          </div>
          <div class="actions">
            <button class="btn btn-search">Buscar</button>
          </div>
        </form>
      </div>

      <!-- Filtros para Alquilar -->
      <div class="filters" *ngIf="selectedFilter === 'rent'">
        <form class="filters-form" (submit)="$event.preventDefault()">
          <input type="text" placeholder="Ubicación" name="location" />
          <select name="leaseTerm">
            <option value="">Plazo</option>
            <option>Mensual</option>
            <option>Anual</option>
          </select>
          <input type="number" placeholder="Tamaño (m²)" name="size" />
          <div class="price-range">
            <input type="number" placeholder="Precio mínimo" name="priceMin" />
            <input type="number" placeholder="Precio máximo" name="priceMax" />
          </div>
          <div class="actions">
            <button class="btn btn-search">Buscar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <!-- Decorative layered curve at bottom (dynamic) -->
  <div class="bottom-decor" [class.hidden]="!showButtonsVisible" aria-hidden="true">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" class="decor-svg">
      <path class="layer layer-top" d="M0,80 C220,20 420,140 720,120 C1000,102 1220,30 1440,90 L1440,200 L0,200 Z"></path>
      <path class="layer layer-mid" d="M0,110 C200,60 420,20 720,60 C1000,98 1220,150 1440,120 L1440,200 L0,200 Z"></path>
      <path class="layer layer-bottom" d="M0,140 C200,120 420,160 720,140 C1000,120 1220,90 1440,140 L1440,200 L0,200 Z"></path>
    </svg>
  </div>
</div>
