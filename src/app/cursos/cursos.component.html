<!-- 4. CURSOS Y EDUCACIÓN -->
<div class="filler"></div>
<div class="courses-section" id="cursos">

  <div class="cursos-social-links">
    <a [href]="social.url" target="_blank" class="social-link" [ngClass]="social.network" *ngFor="let social of socialLinks">
      <i [class]="social.icon"></i>
    </a>
  </div>

  <button class="carousel-btn left" (click)="prevSlide()">
    <div class="arrow">
      <div class="arrow-top"></div>
      <div class="arrow-bottom"></div>
    </div>
  </button>

  <div
    class="carousel"
    #carousel
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onTouchEnd()"
    (touchcancel)="onTouchEnd()"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)">

    <div
      class="carousel-track"
      #track
      (transitionend)="onTransitionEnd()"
      [style.--card-width]="cardWidth + 'px'"
      [style.--carousel-gap]="getGapForCurrentWidth() + 'px'">

      <div class="card" *ngFor="let course of slides; let i = index">

        <div class="top-section">
          <a [routerLink]="['/propiedad', course.codpro]" class="course-image">

            <div class="image-loading-overlay" *ngIf="isImageLoading(course.image)">
              <span class="image-loader" aria-label="Cargando imagen"></span>
            </div>

            <div class="image-fallback" *ngIf="hasImageError(course.image)">
              Imagen no disponible
            </div>

            <img
              [src]="course.image"
              [alt]="(course.name || course.title) + ' - imagen'"
              [class.image-hidden]="isImageLoading(course.image)"
              (load)="onImageLoad(course.image)"
              (error)="onImageError(course.image)">

            <div class="price-badge">
              {{ course.priceFormatted || course.price || course.precio }}
            </div>
          </a>
        </div>

        <div class="bottom-section">
          <div class="location">
            <div class="loc-icon">
              <div class="loader-shape-3" aria-hidden="true"></div>
            </div>
            <div class="loc-text">
              {{ course.location || course.ubicacion || course.address }}
            </div>
          </div>

          <div class="desc">
            {{ course.description || course.desc || course.summary }}
          </div>

          <div class="stats-row">
            <div *ngIf="course.area" class="stat">
              <span class="stat-icon"><i class="fas fa-ruler-combined" aria-hidden="true"></i></span>
              <span class="stat-value">{{ course.area }}</span>
            </div>
            <div *ngIf="course.rooms" class="stat">
              <span class="stat-icon"><i class="fas fa-bed" aria-hidden="true"></i></span>
              <span class="stat-value">{{ course.rooms }}</span>
            </div>
            <div *ngIf="course.baths" class="stat">
              <span class="stat-icon"><i class="fas fa-bath" aria-hidden="true"></i></span>
              <span class="stat-value">{{ course.baths }}</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <button class="carousel-btn right" (click)="nextSlide()">
    <div class="arrow">
      <div class="arrow-top"></div>
      <div class="arrow-bottom"></div>
    </div>
  </button>

</div>
